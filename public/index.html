<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Login page for the wardrobe application"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="CSS/login.css" rel="stylesheet" />

    <script type="module">
        import App from "./JS/login.js";
        const app = new App();
    </script>
</head>
<body>
    <img src="images/clothing_background.jpg" alt="clothing background" class="background">
    <div class="login-page-wrapper">
        <div class="form-box login">
            <h2>Login</h2>
            <form action="#" id="login">
                <div class="form-error hidden" id="login-error-message">
                    <p>Invalid Email or Password</p>
                </div>
                <div class="input-box">
                    <input type="email" id="login-email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <input type="password" id="login-password" required>
                    <label>Password</label>
                </div>
                <button type="submit" class="btn">Login</button>
                <div class="login-register">
                    <p>Don't have an account? <a href="#" class="register-link">Register</a></p>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <h2>Registration</h2>
            <form action="#" id="register">
                <div class="form-error hidden" id="register-error-message">
                    <p>Account already exits</p>
                </div>
                <div class="input-box">
                    <input type="text" id="username" required>
                    <label>Username</label>
                </div>
                <div class="input-box">
                    <input type="email" id="register-email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <input type="password" id="register-password" required>
                    <label>Password</label>
                </div>
                <button type="submit" class="btn">Register</button>
                <div class="login-register">
                    <p>Already have an account? <a href="#" class="login-link">Login</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
